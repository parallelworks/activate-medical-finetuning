# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
---
# ==============================================================================
# Medical LLM Fine-tuning Workflow (EMED)
# ==============================================================================
# Fine-tunes LLMs (Llama, Mistral, Gemma) on HuggingFace medical datasets using
# QLoRA/LoRA via Singularity containers. Generates vLLM-compatible merged weights
# to be used directly with the activate-rag-vllm workflow.
#
# Workflow:
#   1. setup               - Clone the activate-medical-finetuning repository
#   2. prepare_model       - Download base model from HuggingFace (git-lfs)
#   3. finetune            - Create script + submit via script_submitter subworkflow
#   4. cleanup             - Print summary with path to use in RAG-vLLM workflow
# ==============================================================================

permissions:
  - '*'

'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: GPU Cluster
        autoselect: true
        include-workspace: false
        tooltip: GPU cluster to run the fine-tuning job

      submit_to_scheduler:
        type: boolean
        label: Submit to Job Scheduler
        tooltip: Enable to submit via SLURM scheduler. Disable for direct SSH execution.
        default: true
        hidden: true

      model_selection:
        type: group
        label: Model Configuration
        items:
          model_config:
            label: Configuration Preset
            type: dropdown
            default: llama3-8b-medical-quick
            optional: true
            options:
              - value: llama3-8b-medical-quick
                label: Llama 3 8B Medical (Quick Test)
              - value: llama3-8b-medical
                label: Llama 3 8B Medical (Production)
              - value: mistral-7b-medical
                label: Mistral 7B Medical
              - value: gemma-7b-medical
                label: Gemma 7B Medical

          base_model_id:
            label: HuggingFace Model ID
            type: string
            default: "${{ inputs.model_selection.model_config == 'gemma-7b-medical' ? 'google/gemma-1.1-7b-it' : (inputs.model_selection.model_config == 'mistral-7b-medical' ? 'mistralai/Mistral-7B-Instruct-v0.2' : 'meta-llama/Llama-3.1-8B-Instruct') }}"
            prefillDefault: true
            tooltip: HuggingFace model ID to use as the base model for fine-tuning

          hf_token:
            label: HuggingFace Token
            optional: true
            default: ${{ org.HF_TOKEN }}
            type: password
            tooltip: Required for gated models (Llama, etc.)

          model_cache_dir:
            type: string
            label: Model Cache Directory
            default: /public/codelab/models
            prefillDefault: true
            tooltip: Directory to cache the base model. Reused across runs if the model is already present.

      output_dir:
        label: Fine-tuned Model Output Directory
        type: string
        default: /public/codelab/models/fine-tuned-${PW_JOB_ID}
        prefillDefault: true
        tooltip: >
          Directory where the merged fine-tuned model weights will be saved.
          ${PW_JOB_ID} is replaced at runtime with the workflow job ID.
          Use this path as the model directory in the activate-rag-vllm workflow
          (set Model Source to "Local Path").

      slurm:
        type: group
        label: SLURM Directives
        hidden: ${{ inputs.resource.schedulerType != 'slurm' || inputs.submit_to_scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'slurm' || inputs.submit_to_scheduler == false }}
        items:
          slurm_options:
            type: dropdown
            label: Select Cluster
            optional: true
            options:
              - value: ''
                label: Default
              - value: hpc4
                label: HPC4
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
          partition_default:
            type: slurm-partitions
            label: SLURM partition
            ignore: ${{ 'hpc4' == inputs.slurm.slurm_options }}
            hidden: ${{ .ignore }}
            optional: true
            resource: ${{ inputs.resource }}
            tooltip: Select a partition from the drop down menu. Leave empty to let SLURM pick a partition.
          partition_hpc4:
            type: dropdown
            label: SLURM partition
            optional: true
            tooltip: Select a partition from the drop down menu. Leave empty to let SLURM pick a partition.
            ignore: ${{ 'hpc4' != inputs.slurm.slurm_options }}
            hidden: ${{ .ignore }}
            default: gpu
            options:
              - gpu
              - gpu-h200
              - gpu-quick
          num_gpus:
            type: dropdown
            label: Number of GPUs
            default: '4'
            tooltip: Number of GPUs to allocate for fine-tuning (--gres=gpu:N)
            options:
              - value: '1'
                label: 1 GPU
              - value: '2'
                label: 2 GPUs
              - value: '4'
                label: 4 GPUs
              - value: '8'
                label: 8 GPUs
          cpus_per_task:
            type: number
            label: CPUs per task
            min: 1
            max: 64
            default: 8
            tooltip: '--cpus-per-task=value slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          mem:
            type: string
            label: Minimum total memory required
            default: 200GB
            tooltip: '--mem=value slurm directive'
            hidden: ${{ 'existing' != inputs.resource.provider }}
            ignore: ${{ .hidden }}
            optional: true
          time:
            label: Walltime
            type: string
            default: '08:00:00'
            prefillDefault: true
            tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
          scheduler_directives:
            type: editor
            optional: true
            tooltip: |
              Type in additional scheduler directives.

      pbs:
        type: group
        label: PBS Directives
        hidden: ${{ inputs.resource.schedulerType != 'pbs' || inputs.submit_to_scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'pbs' || inputs.submit_to_scheduler == false }}
        items:
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
          scheduler_directives:
            label: Scheduler Directives
            type: editor
            tooltip: Type the PBS scheduler directives

      dataset_config:
        type: group
        label: Dataset Configuration
        collapsed: true
        items:
          dataset_name:
            label: HuggingFace Dataset
            type: string
            default: "${{ inputs.model_selection.model_config == 'llama3-8b-medical-quick' ? 'Shekswess/medical_llama3_instruct_dataset_short' : (inputs.model_selection.model_config == 'mistral-7b-medical' ? 'Shekswess/medical_mistral_instruct_dataset' : (inputs.model_selection.model_config == 'gemma-7b-medical' ? 'Shekswess/medical_gemma_instruct_dataset' : 'Shekswess/medical_llama3_instruct_dataset')) }}"
            tooltip: HuggingFace dataset name for fine-tuning (downloaded and cached during training)

          dataset_cache_dir:
            label: Dataset Cache Directory
            type: string
            default: /public/codelab/datasets
            prefillDefault: true
            tooltip: Shared directory for caching HuggingFace datasets across runs (HF_DATASETS_CACHE)

          dataset_split:
            label: Dataset Split
            type: string
            default: train
            optional: true

          dataset_config_name:
            label: Dataset Config Name
            type: string
            default: ""
            optional: true

          prompt_field:
            label: Prompt Field Name
            type: string
            default: prompt
            optional: true

          max_samples:
            label: Max Samples (0 = all)
            type: number
            default: "${{ inputs.model_selection.model_config == 'llama3-8b-medical-quick' ? 50 : 0 }}"
            optional: true

      training_hyperparameters:
        type: group
        label: Training Hyperparameters
        collapsed: true
        items:
          num_epochs:
            label: Training Epochs
            type: number
            default: "${{ inputs.model_selection.model_config == 'llama3-8b-medical-quick' ? 1.0 : 3.0 }}"
            optional: true
          learning_rate:
            label: Learning Rate
            type: number
            default: 0.0002
            optional: true
          micro_batch_size:
            label: Micro Batch Size (per GPU)
            type: number
            default: "${{ inputs.model_selection.model_config == 'llama3-8b-medical-quick' ? 2 : 1 }}"
            optional: true
          gradient_accumulation:
            label: Gradient Accumulation Steps
            type: number
            default: "${{ inputs.model_selection.model_config == 'llama3-8b-medical-quick' ? 8 : 16 }}"
            optional: true
          max_seq_length:
            label: Max Sequence Length (tokens)
            type: number
            default: "${{ inputs.model_selection.model_config == 'llama3-8b-medical-quick' ? 512 : 2048 }}"
            optional: true

      lora_config:
        type: group
        label: LoRA / PEFT Configuration
        collapsed: true
        items:
          lora_r:
            label: LoRA Rank (r)
            type: number
            default: "${{ inputs.model_selection.model_config == 'llama3-8b-medical-quick' ? 32 : 64 }}"
            optional: true
          lora_alpha:
            label: LoRA Alpha
            type: number
            default: 16
            optional: true
          lora_dropout:
            label: LoRA Dropout Rate
            type: number
            default: 0.05
            optional: true
          quantization:
            label: Quantization Mode
            type: dropdown
            default: 4bit
            optional: true
            options:
              - value: 4bit
              - value: 8bit
              - value: none
          gradient_checkpointing:
            label: Enable Gradient Checkpointing
            type: boolean
            default: true
            optional: true
          bf16:
            label: Use BF16 Mixed Precision
            type: boolean
            default: true
            optional: true
          packing:
            label: Enable Dataset Packing
            type: boolean
            default: false
            optional: true

      container:
        type: group
        label: Container Options
        collapsed: true
        items:
          finetune_path:
            label: Fine-tune Container Path
            type: string
            default: /public/codelab/singularity/finetune_sandbox
            placeholder: /public/codelab/singularity/finetune_sandbox
            prefillDefault: true
            tooltip: Path to Singularity container (.sif file or sandbox directory) for fine-tuning

      advanced_settings:
        type: group
        label: Advanced Settings
        collapsed: true
        items:
          rundir:
            label: Run Directory
            default: ${HOME}/pw/activate-medical-finetuning
            type: string
            tooltip: Directory where the workflow repository will be cloned and the job will run
          repository:
            type: string
            label: Repository
            default: https://github.com/parallelworks/activate-medical-finetuning.git
          repository_branch:
            type: string
            label: Repository Branch
            default: main

jobs:
  setup:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Clone Repository
        id: clone_repo
        early-cancel: any-job-failed
        run: |
          set -x
          RUNDIR="${{ inputs.advanced_settings.rundir }}"
          RUNDIR="${RUNDIR/#\~/$HOME}"

          mkdir -p "$(dirname $RUNDIR)"

          if [[ -d "$RUNDIR/.git" ]]; then
            echo "Repository exists, updating..."
            cd "$RUNDIR"
            git fetch origin
            git checkout ${{ inputs.advanced_settings.repository_branch }}
            git reset --hard origin/${{ inputs.advanced_settings.repository_branch }}
          else
            echo "Cloning fresh repository..."
            git clone -b ${{ inputs.advanced_settings.repository_branch }} ${{ inputs.advanced_settings.repository }} "$RUNDIR"
          fi

          cd "$RUNDIR"
          rm -f jobid run.out HOSTNAME

          # Needed for script_submitter stream_output job
          touch run.${PW_JOB_ID}.out

          echo "RUNDIR=${RUNDIR}" >> $OUTPUTS

  prepare_model:
    needs:
      - setup
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    outputs:
      model_path: ${{ needs.prepare_model.steps.clone_model.outputs.model_path }}
    steps:
      - name: Clone HuggingFace Model
        id: clone_model
        early-cancel: any-job-failed
        run: |
          set -x
          export PATH=/public/codelab/git-lfs-3.7.1:$PATH

          MODEL_ID="${{ inputs.model_selection.base_model_id }}"
          CACHE_DIR="${{ inputs.model_selection.model_cache_dir }}"
          CACHE_DIR="${CACHE_DIR/#\~/$HOME}"
          HF_TOKEN="${{ inputs.model_selection.hf_token }}"

          mkdir -p "$CACHE_DIR"
          MODEL_BASENAME="${MODEL_ID##*/}"
          LEGACY_DIR="$CACHE_DIR/${MODEL_ID//\//__}"
          TARGET_DIR="$CACHE_DIR/$MODEL_BASENAME"

          if [[ -d "$LEGACY_DIR" && ! -d "$TARGET_DIR" ]]; then
            echo "Renaming legacy cache dir $LEGACY_DIR to $TARGET_DIR"
            mv "$LEGACY_DIR" "$TARGET_DIR"
          fi

          # Validate that model weights are real (not LFS pointers)
          validate_weights() {
            local dir=$1
            [[ ! -f "$dir/config.json" ]] && return 1
            local weight_file=""
            if [[ -f "$dir/model.safetensors" ]]; then
              weight_file="$dir/model.safetensors"
            elif ls "$dir"/model*.safetensors 1>/dev/null 2>&1; then
              weight_file=$(ls "$dir"/model*.safetensors | head -1)
            elif ls "$dir"/*.bin 1>/dev/null 2>&1; then
              weight_file=$(ls "$dir"/*.bin | head -1)
            else
              echo "No weight files found"
              return 1
            fi
            local size=$(stat -c%s "$weight_file" 2>/dev/null || stat -f%z "$weight_file" 2>/dev/null)
            if [[ $size -lt 1000000 ]]; then
              echo "Weight file $weight_file appears to be LFS pointer (size: $size bytes)"
              return 1
            fi
            return 0
          }

          if [[ -d "$TARGET_DIR" ]] && validate_weights "$TARGET_DIR"; then
            echo "Model already cached and validated at $TARGET_DIR"
          else
            if [[ -d "$TARGET_DIR" ]]; then
              echo "Cached model at $TARGET_DIR appears incomplete, removing..."
              rm -rf "$TARGET_DIR"
            fi
            echo "Cloning model $MODEL_ID to $TARGET_DIR"

            if ! git lfs version >/dev/null 2>&1; then
              echo "Installing git-lfs locally..."
              mkdir -p $HOME/.local
              cd /tmp
              LFS_URL=$(curl -s https://api.github.com/repos/git-lfs/git-lfs/releases/latest | grep browser_download_url | grep linux-amd64 | head -1 | cut -d '"' -f 4)
              [[ -z "$LFS_URL" ]] && { echo "ERROR: Could not find git-lfs download URL"; exit 1; }
              wget -q "$LFS_URL" -O git-lfs-linux-amd64.tar.gz
              tar -xzf git-lfs-linux-amd64.tar.gz
              ./git-lfs-*/install.sh --local
              rm -rf git-lfs-*
              export PATH="$HOME/.local/bin:$PATH"
              git lfs version >/dev/null 2>&1 || { echo "ERROR: Failed to install git-lfs"; exit 1; }
            fi

            git lfs install

            REPO_URL="https://huggingface.co/$MODEL_ID"
            [[ -n "$HF_TOKEN" ]] && REPO_URL="https://user:${HF_TOKEN}@huggingface.co/$MODEL_ID"

            GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 "$REPO_URL" "$TARGET_DIR"
            cd "$TARGET_DIR"
            git lfs pull
            cd "$CACHE_DIR"

            if [[ -f "$TARGET_DIR/model.safetensors" ]]; then
              actual_size=$(stat -c%s "$TARGET_DIR/model.safetensors" 2>/dev/null || stat -f%z "$TARGET_DIR/model.safetensors" 2>/dev/null)
              [[ $actual_size -lt 1000000 ]] && { echo "ERROR: model.safetensors appears to be an LFS pointer, not actual weights"; exit 1; }
            elif ls "$TARGET_DIR"/model*.safetensors 1>/dev/null 2>&1; then
              for f in "$TARGET_DIR"/model*.safetensors; do
                actual_size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
                [[ $actual_size -lt 1000000 ]] && { echo "ERROR: $f appears to be an LFS pointer, not actual weights"; exit 1; }
                break
              done
            fi

            [[ ! -f "$TARGET_DIR/config.json" ]] && { echo "ERROR: Model clone incomplete - missing config.json"; exit 1; }
          fi

          echo "model_path=$TARGET_DIR" >> $OUTPUTS
          echo "Model ready at $TARGET_DIR"

  finetune:
    needs:
      - setup
      - prepare_model
    working-directory: ${{ inputs.advanced_settings.rundir }}
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Verify container and prepare output directory
        id: prepare
        early-cancel: any-job-failed
        run: |
          set -x
          SIF_PATH="${{ inputs.container.finetune_path }}"
          if [[ -d "${SIF_PATH}" ]]; then
            # Sandbox directory — verify it has the Singularity metadata file
            if [[ ! -f "${SIF_PATH}/singularity" ]]; then
              echo "WARNING: ${SIF_PATH} exists but does not contain the 'singularity' metadata file; it may not be a valid sandbox"
            fi
            echo "Container type: sandbox directory"
          elif [[ -f "${SIF_PATH}" ]]; then
            echo "Container type: SIF image"
          else
            echo "ERROR: Singularity container not found at ${SIF_PATH}"
            exit 1
          fi
          echo "Container verified: ${SIF_PATH}"

          OUTPUT_DIR="${{ inputs.output_dir }}"
          OUTPUT_DIR=$(eval echo "${OUTPUT_DIR}")
          mkdir -p "${OUTPUT_DIR}"
          echo "Output directory: ${OUTPUT_DIR}"

      - name: Create fine-tuning script
        early-cancel: any-job-failed
        run: |
          set -x
          RUNDIR="${{ inputs.advanced_settings.rundir }}"
          RUNDIR="${RUNDIR/#\~/$HOME}"
          SCRIPT_PATH="${RUNDIR}/start_finetune.sh"

          cat > "${SCRIPT_PATH}" << 'SCRIPTEOF'
          #!/bin/bash
          set -euo pipefail
          module load cuda/12.1

          RUNDIR="${{ inputs.advanced_settings.rundir }}"
          RUNDIR="${RUNDIR/#\~/$HOME}"

          # Container (use existing path on shared filesystem — .sif file or sandbox directory)
          export SIF_PATH="${{ inputs.container.finetune_path }}"
          if [[ -d "${SIF_PATH}" ]]; then
            echo "Container type: sandbox directory"
          elif [[ -f "${SIF_PATH}" ]]; then
            echo "Container type: SIF image"
          else
            echo "ERROR: Singularity container not found at ${SIF_PATH}"
            exit 1
          fi
          echo "Using Singularity container: ${SIF_PATH}"

          # Base model (pre-downloaded from HuggingFace by prepare_model job)
          export MODEL_ID="${{ needs.prepare_model.outputs.model_path }}"
          echo "Base model: ${MODEL_ID}"

          # Output directory for fine-tuned weights (expand ${PW_JOB_ID} at runtime)
          export OUTPUT_DIR=$(eval echo "${{ inputs.output_dir }}")
          mkdir -p "${OUTPUT_DIR}"
          echo "Fine-tuned model output directory: ${OUTPUT_DIR}"

          # Dataset — HuggingFace only; downloaded and cached during training
          export DATASET_SOURCE="huggingface"
          export DATASET_NAME="${{ inputs.dataset_config.dataset_name }}"
          export DATASET_SPLIT="${{ inputs.dataset_config.dataset_split }}"
          export DATASET_CONFIG_NAME="${{ inputs.dataset_config.dataset_config_name }}"
          export PROMPT_FIELD="${{ inputs.dataset_config.prompt_field }}"
          export MAX_SAMPLES="${{ inputs.dataset_config.max_samples }}"
          export DATASET_CACHE_DIR="${{ inputs.dataset_config.dataset_cache_dir }}"
          export HF_DATASETS_CACHE="${{ inputs.dataset_config.dataset_cache_dir }}"

          # Training hyperparameters
          export NUM_EPOCHS="${{ inputs.training_hyperparameters.num_epochs }}"
          export LEARNING_RATE="${{ inputs.training_hyperparameters.learning_rate }}"
          export MICRO_BATCH_SIZE="${{ inputs.training_hyperparameters.micro_batch_size }}"
          export GRADIENT_ACCUMULATION="${{ inputs.training_hyperparameters.gradient_accumulation }}"
          export MAX_SEQ_LENGTH="${{ inputs.training_hyperparameters.max_seq_length }}"

          # LoRA / PEFT configuration
          export LORA_R="${{ inputs.lora_config.lora_r }}"
          export LORA_ALPHA="${{ inputs.lora_config.lora_alpha }}"
          export LORA_DROPOUT="${{ inputs.lora_config.lora_dropout }}"
          export QUANTIZATION="${{ inputs.lora_config.quantization }}"
          export BF16="${{ inputs.lora_config.bf16 }}"
          export GRADIENT_CHECKPOINTING="${{ inputs.lora_config.gradient_checkpointing }}"
          export PACKING="${{ inputs.lora_config.packing }}"

          # Always merge LoRA weights into full model for vLLM compatibility
          export MERGE_FULL_WEIGHTS="true"
          export MERGED_SAVE_FORMAT="safetensors"

          echo "======================================"
          echo "Training Configuration"
          echo "======================================"
          echo "Base Model:    ${MODEL_ID}"
          echo "Dataset:       ${DATASET_NAME}"
          echo "Output Dir:    ${OUTPUT_DIR}"
          echo "Epochs:        ${NUM_EPOCHS}"
          echo "Max Samples:   ${MAX_SAMPLES}"
          echo "Quantization:  ${QUANTIZATION}"
          echo "LoRA Rank:     ${LORA_R}"
          echo "GPUs:          ${CUDA_VISIBLE_DEVICES:-all}"
          echo "======================================"

          cd "${RUNDIR}"
          ./scripts/run.sh

          echo "======================================"
          echo "Fine-tuning complete!"
          echo "Merged model saved to: ${OUTPUT_DIR}"
          echo ""
          echo "To serve with activate-rag-vllm:"
          echo "  - Model Source  → Local Path"
          echo "  - Model Path    → ${OUTPUT_DIR}"
          echo "======================================"
          SCRIPTEOF
          chmod +x "${SCRIPT_PATH}"

      - name: Submit fine-tuning job via script_submitter
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/script_submitter/v3.6/emed.yaml
          resource: ${{ inputs.resource }}
          shebang: '#!/bin/bash'
          rundir: ${{ inputs.advanced_settings.rundir }}
          use_existing_script: true
          script_path: ${{ inputs.advanced_settings.rundir }}/start_finetune.sh
          define_cleanup_script: false
          scheduler: ${{ inputs.submit_to_scheduler }}
          slurm:
            is_enabled: ${{ inputs.slurm.is_enabled }}
            slurm_options: ${{ inputs.slurm.slurm_options }}
            partition_default: ${{ inputs.slurm.partition_default }}
            partition_hpc4: ${{ inputs.slurm.partition_hpc4 }}
            cpus_per_task: ${{ inputs.slurm.cpus_per_task }}
            mem: ${{ inputs.slurm.mem }}
            gres_gpu_default: ${{ inputs.slurm.num_gpus }}
            gres_gpu_hpc4: ${{ inputs.slurm.num_gpus }}
            time: ${{ inputs.slurm.time }}
            scheduler_directives: ${{ inputs.slurm.scheduler_directives }}
          pbs:
            is_enabled: ${{ inputs.pbs.is_enabled }}
            scheduler_directives: ${{ inputs.pbs.scheduler_directives }}
